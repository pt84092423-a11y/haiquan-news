name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: haiquan-news/package-lock.json

      - name: Install dependencies
        run: |
          cd haiquan-news
          npm ci

      - name: Pre-fetch YouTube data (baked into static build)
        run: |
          cd haiquan-news
          node scripts/fetch-youtube.mjs

      - name: Build frontend
        run: |
          cd haiquan-news
          npm run build

      - name: Deploy to InfinityFree via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./haiquan-news/dist/
          server-dir: /baohaiquansrov.xo.je/htdocs/
