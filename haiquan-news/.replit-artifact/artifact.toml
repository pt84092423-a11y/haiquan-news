kind = "web"
previewPath = "/"
title = "Báo Hải Quân Việt Nam"
version = "1.0.0"
id = "artifacts/haiquan-news"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19865

[services.development]
run = "pnpm --filter @workspace/haiquan-news run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/haiquan-news", "run", "build" ]
publicDir = "artifacts/haiquan-news/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19865"
BASE_PATH = "/"
